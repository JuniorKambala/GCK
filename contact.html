    <section id="contact">
        
        <div class="contenu-form">
            <form>
                <label for="name">Nom Complet</label>
                <input type="text" id="name" name="name" placeholder="Veuillez entrer votre nom complet" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Veuillez entrer votre email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Votre message ici..." required></textarea>

                <button type="submit">Envoyer</button>
            </form>
        </div>

    </section>
